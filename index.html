<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IAPE - Educação que transforma</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}

:root{
  --primary:#1d5cff;
  --dark:#081420;
  --yellow:#ffcb2f;
  --white:#ffffff;
}

/* HERO */
.hero{
  width:100%;
  min-height:100vh;
  position:relative;
  background:
  linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
  url('https://s.educacaoadventista.org.br/escola/estruturas/SSdYmfHh2ZDKcc5WWHkdEsbT3IEzKsJ4RpdWARnP.png');
  background-size:cover;
  background-position:center;
}

/* HEADER */
.topbar{
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
  z-index:999;
  background:rgba(0,0,0,.25);
  backdrop-filter:blur(8px);
  transition:.3s;
}

.topbar.scrolled{
  background:rgba(0,0,0,.85);
  padding:14px 40px;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:55px;
  height:55px;
  border-radius:12px;
  overflow:hidden;
}

.logo-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MENU DESKTOP */
.right-area{
  display:flex;
  align-items:center;
  gap:25px;
}

.menu{
  display:flex;
  align-items:center;
  gap:35px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:22px;
  transition:.3s;
}

.menu a:hover{
  color:var(--yellow);
}

/* BOTÃO SANDUÍCHE */
.menu-toggle{
  width:45px;
  height:35px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  z-index:1002;
}

.menu-toggle span{
  width:100%;
  height:5px;
  background:white;
  border-radius:20px;
  transition:.3s;
}

.menu-toggle.active span:nth-child(1){
  transform:translateY(15px) rotate(45deg);
}

.menu-toggle.active span:nth-child(2){
  opacity:0;
}

.menu-toggle.active span:nth-child(3){
  transform:translateY(-15px) rotate(-45deg);
}

/* SIDEBAR (NOVA) */
.sidebar{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100vh;
  background:rgba(7,17,29,.96);
  backdrop-filter:blur(10px);
  padding:120px 35px;
  display:flex;
  flex-direction:column;
  gap:28px;
  transition:.4s;
  z-index:1001;
  box-shadow:-10px 0 30px rgba(0,0,0,.45);
}

.sidebar.active{
  right:0;
}

.sidebar a{
  color:white;
  text-decoration:none;
  font-size:24px;
  transition:.3s;
}

.sidebar a:hover{
  color:var(--yellow);
}

/* HERO CONTENT */
.hero-content{
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:140px 60px 80px;
}

.hero-title{
  font-size:clamp(55px, 9vw, 100px);
  font-weight:300;
  line-height:1.1;
}

.hero-title .blue{
  color:#2f72ff;
  font-weight:500;
}

/* RESPONSIVO SIMPLES */
@media(max-width:600px){
  .hero-content{
    padding:140px 25px;
  }
}

</style>
</head>

<body>

<section class="hero">

<header class="topbar">

  <div class="logo">
    <div class="logo-icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Adventist_Symbol.svg/512px-Adventist_Symbol.svg.png">
    </div>
    <div>
      <h1>IAPE</h1>
      <span>Instituto Adventista</span>
    </div>
  </div>

  <div class="right-area">

    <!-- MENU NORMAL -->
    <nav class="menu">
      <a href="#matriculas">MATRÍCULAS</a>
      <a href="#estrutura">ESTRUTURA</a>
      <a href="#ensino">ENSINO</a>
    </nav>

    <!-- BOTÃO -->
    <div class="menu-toggle" id="menuToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="#sobre">SOBRE</a>
  <a href="#equipe">EQUIPE</a>
  <a href="#localizacao">LOCALIZAÇÃO</a>
  <a href="#galeria">GALERIA DE FOTOS</a>
</div>

<div class="hero-content">
  <h1 class="hero-title">
    Muito Além <br>
    do Ensino <br>
    <span class="blue">Para a vida inteira</span>
  </h1>
</div>

</section>

<script>

const menuToggle = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");

menuToggle.addEventListener("click", () => {
  sidebar.classList.toggle("active");
  menuToggle.classList.toggle("active");
});

/* fechar ao clicar */
document.querySelectorAll(".sidebar a").forEach(a => {
  a.addEventListener("click", () => {
    sidebar.classList.remove("active");
    menuToggle.classList.remove("active");
  });
});

</script>

</body>
</html>
