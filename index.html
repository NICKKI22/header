<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IAPE - Educação que transforma</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0f14;
  color:white;
  overflow-x:hidden;
}

:root{
  --primary:#1d5cff;
  --dark:#081420;
  --yellow:#ffcb2f;
  --white:#ffffff;
}

/* =====================================
   HERO
===================================== */

.hero{
  width:100%;
  min-height:100vh;
  position:relative;

  background:
  linear-gradient(
    rgba(0,0,0,.55),
    rgba(0,0,0,.55)
  ),
  url('https://s.educacaoadventista.org.br/escola/estruturas/SSdYmfHh2ZDKcc5WWHkdEsbT3IEzKsJ4RpdWARnP.png');

  background-size:cover;
  background-position:center;
  overflow:hidden;
}

/* =====================================
   HEADER
===================================== */

.topbar{
  width:100%;
  padding:18px 40px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:fixed;
  top:0;
  left:0;

  z-index:999;

  background:rgba(0,0,0,.25);
  backdrop-filter:blur(8px);

  transition:.3s;
}

.topbar.scrolled{
  background:rgba(0,0,0,.85);
  padding:14px 40px;
}

/* =====================================
   LOGO
===================================== */

.logo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:55px;
  height:55px;
  border-radius:12px;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  background:white;
}

.logo-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.logo-text h1{
  font-size:30px;
  line-height:1;
}

.logo-text span{
  font-size:13px;
  opacity:.85;
}

/* =====================================
   ÁREA DIREITA
===================================== */

.right-area{
  display:flex;
  align-items:center;
  gap:25px;
}

/* =====================================
   MENU
===================================== */

.menu{
  display:flex;
  align-items:center;
  gap:35px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:22px;
  transition:.3s;
}

.menu a:hover{
  color:var(--yellow);
}

.menu a.active{
  color:var(--yellow);
}

/* =====================================
   BOTÃO SANDUÍCHE
===================================== */

.menu-toggle{
  width:45px;
  height:35px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  cursor:pointer;
  z-index:1001;
}

.menu-toggle span{
  width:100%;
  height:5px;
  background:white;
  border-radius:20px;
  transition:.3s;
}

/* ANIMAÇÃO */

.menu-toggle.active span:nth-child(1){
  transform:translateY(15px) rotate(45deg);
}

.menu-toggle.active span:nth-child(2){
  opacity:0;
}

.menu-toggle.active span:nth-child(3){
  transform:translateY(-15px) rotate(-45deg);
}

/* =====================================
   HERO CONTENT
===================================== */

.hero-content{
  width:100%;
  min-height:100vh;

  display:flex;
  align-items:center;

  padding:140px 60px 80px;
}

.hero-left{
  max-width:700px;
}

.subtitle{
  color:#2f72ff;
  font-size:28px;

  margin-bottom:10px;

  display:flex;
  align-items:center;
  gap:15px;
}

.subtitle::before{
  content:'';
  width:45px;
  height:2px;
  background:#2f72ff;
}

.hero-title{
  font-size:clamp(55px, 9vw, 100px);
  font-weight:300;
  line-height:1.1;

  margin-bottom:40px;
}

.hero-title .blue{
  color:#2f72ff;
  font-weight:500;
}

/* =====================================
   BOTÃO VÍDEO
===================================== */

.play-btn{
  background:#0f2b4b;
  border:none;

  color:white;

  padding:22px 34px;
  border-radius:60px;

  font-size:22px;

  display:flex;
  align-items:center;
  gap:18px;

  cursor:pointer;

  transition:.3s;
}

.play-btn:hover{
  transform:translateY(-3px);
  background:#123b67;
}

.play-icon{
  width:44px;
  height:44px;

  border-radius:50%;
  border:2px solid white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:18px;
}

/* =====================================
   MODAL
===================================== */

.video-modal{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.85);

  display:none;
  justify-content:center;
  align-items:center;

  z-index:2000;

  padding:20px;
}

.video-box{
  width:100%;
  max-width:900px;
  aspect-ratio:16/9;

  background:#000;

  border-radius:20px;
  overflow:hidden;

  position:relative;
}

.video-box iframe{
  width:100%;
  height:100%;
  border:none;
}

.close-modal{
  position:absolute;
  top:-50px;
  right:0;

  background:white;
  color:black;

  border:none;

  width:40px;
  height:40px;

  border-radius:50%;

  font-size:20px;
  cursor:pointer;
}

/* =====================================
   FOOTER
===================================== */

footer{
  padding:35px;
  text-align:center;

  background:#050b12;
  color:#aaa;
}

/* =====================================
   RESPONSIVO
===================================== */

@media(max-width:900px){

  .menu{
    position:fixed;
    top:0;
    right:-100%;

    width:280px;
    height:100vh;

    background:#07111d;

    flex-direction:column;
    justify-content:center;
    align-items:center;

    transition:.4s;
  }

  .menu.active{
    right:0;
  }

  .hero-content{
    padding:150px 30px 80px;
  }

  .hero-title{
    font-size:65px;
  }

  .subtitle{
    font-size:20px;
  }

}

@media(max-width:600px){

  .topbar{
    padding:18px 20px;
  }

  .hero-title{
    font-size:52px;
  }

  .play-btn{
    width:100%;
    justify-content:center;
  }

}

</style>
</head>

<body>

<!-- =====================================
     HERO
===================================== -->

<section class="hero">

<header class="topbar" id="topbar">

  <!-- LOGO -->

  <div class="logo">

    <div class="logo-icon">
      <img src="https://s.educacaoadventista.org.br/escola/estruturas/SSdYmfHh2ZDKcc5WWHkdEsbT3IEzKsJ4RpdWARnP.png" alt="Logo IAPE">
    </div>

    <div class="logo-text">
      <h1>IAPE</h1>
      <span>Instituto Adventista</span>
    </div>

  </div>

  <!-- MENU + BOTÃO -->

  <div class="right-area">

    <nav class="menu" id="menu">

      <a href="#matriculas">MATRÍCULAS</a>

      <a href="#estrutura">ESTRUTURA</a>

      <a href="#ensino" class="active">
        ENSINO
      </a>

    </nav>

    <!-- MENU SANDUÍCHE -->

    <div class="menu-toggle" id="menuToggle">

      <span></span>
      <span></span>
      <span></span>

    </div>

  </div>

</header>

<!-- HERO CONTENT -->

<div class="hero-content">

  <div class="hero-left">

    <div class="subtitle">
      EDUCAÇÃO QUE TRANSFORMA
    </div>

    <h1 class="hero-title">
      Muito Além <br>
      do Ensino <br>
      <span class="blue">Para a vida</span> inteira
    </h1>

    <button class="play-btn" id="playVideo">

      <div class="play-icon">▶</div>

      Reproduzir Vídeo

    </button>

  </div>

</div>

</section>

<!-- FOOTER -->

<footer>
  © 2026 IAPE - Todos os direitos reservados.
</footer>

<!-- =====================================
     MODAL
===================================== -->

<div class="video-modal" id="videoModal">

<div class="video-box">

  <button class="close-modal" id="closeModal">
    ✕
  </button>

  <iframe
    id="videoFrame"
    src=""
    allowfullscreen>
  </iframe>

</div>

</div>

<!-- =====================================
     SCRIPT
===================================== -->

<script>

/* =====================================
   MENU MOBILE
===================================== */

const menuToggle =
document.getElementById("menuToggle");

const menu =
document.getElementById("menu");

menuToggle.addEventListener("click", () => {

  menu.classList.toggle("active");

  menuToggle.classList.toggle("active");

});

/* FECHAR MENU AO CLICAR */

document.querySelectorAll(".menu a")
.forEach(link => {

  link.addEventListener("click", () => {

    menu.classList.remove("active");

    menuToggle.classList.remove("active");

  });

});

/* =====================================
   HEADER SCROLL
===================================== */

const topbar =
document.getElementById("topbar");

window.addEventListener("scroll", () => {

  if(window.scrollY > 50){

    topbar.classList.add("scrolled");

  }else{

    topbar.classList.remove("scrolled");

  }

});

/* =====================================
   VÍDEO
===================================== */

const playVideo =
document.getElementById("playVideo");

const videoModal =
document.getElementById("videoModal");

const closeModal =
document.getElementById("closeModal");

const videoFrame =
document.getElementById("videoFrame");

playVideo.addEventListener("click", () => {

  videoModal.style.display = "flex";

  videoFrame.src =
  "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";

});

closeModal.addEventListener("click", () => {

  videoModal.style.display = "none";

  videoFrame.src = "";

});

</script>

</body>
</html>]
